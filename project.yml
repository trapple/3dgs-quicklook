name: SPZQuickLook
options:
  bundleIdPrefix: jp.trapple
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    # バージョンの正。リリース時はここを読む
    MARKETING_VERSION: "1.2.2"
    CURRENT_PROJECT_VERSION: "1"

packages:
  MetalSplatter:
    url: https://github.com/scier/MetalSplatter
    exactVersion: 1.0.1

schemes:
  SPZQuickLook:
    build:
      targets:
        SPZQuickLook: all
        ply2spz: all
    run:
      config: Release
    test:
      targets: [UnitTests]

targets:
  SPZQuickLook:
    type: application
    platform: macOS
    sources: [SPZQuickLook, Shared]
    info:
      path: SPZQuickLook/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSPrincipalClass: NSApplication
        NSMainStoryboardFile: ""
        CFBundleDocumentTypes:
          - CFBundleTypeName: Gaussian Splat (SPZ)
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes: [com.nianticlabs.spz]
          # .ply はシステム宣言 UTI (public.polygon-file-format) を claim する。
          # メッシュ .ply も本拡張が受ける (3DGS でなければ QL 標準フォールバック) — spec 参照
          - CFBundleTypeName: Polygon File Format (3D Gaussian Splatting)
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes: [public.polygon-file-format]
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.nianticlabs.spz
            UTTypeDescription: Gaussian Splat (SPZ)
            UTTypeConformsTo: [public.data, public.3d-content]
            UTTypeTagSpecification:
              public.filename-extension: [spz]
    dependencies:
      - target: PreviewExtension
        embed: true
      - package: MetalSplatter
        product: MetalSplatter
      - package: MetalSplatter
        product: SplatIO

  PreviewExtension:
    type: app-extension
    platform: macOS
    sources: [PreviewExtension, Shared]
    settings:
      base:
        # 親アプリの bundle ID をプレフィックスにしないと ValidateEmbeddedBinary で失敗する
        PRODUCT_BUNDLE_IDENTIFIER: jp.trapple.SPZQuickLook.PreviewExtension
    # sandbox 必須: 無いと pkd が "plug-ins must be sandboxed" で登録を拒否する
    entitlements:
      path: PreviewExtension/PreviewExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
    info:
      path: PreviewExtension/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: SPZ Preview
        # appex は XPC! でないと pluginkit に登録されない
        CFBundlePackageType: "XPC!"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PreviewViewController"
          NSExtensionAttributes:
            QLSupportedContentTypes: [com.nianticlabs.spz, public.polygon-file-format]
            QLSupportsSearchableItems: false
    dependencies:
      - package: MetalSplatter
        product: MetalSplatter
      - package: MetalSplatter
        product: SplatIO

  # .ply/.splat → .spz 変換 CLI。app の Contents/Helpers に同梱する
  # (コピーと再署名は Makefile / release.sh が行う)
  ply2spz:
    type: tool
    platform: macOS
    sources: [CLI]
    dependencies:
      - package: MetalSplatter
        product: SplatIO

  UnitTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - Tests
      - path: Shared/MatrixMath.swift
      - path: Shared/SplatBounds.swift
      - path: Shared/OrbitCamera.swift
